# =============================================================================
# Heimdal Platform — Docker Compose (Production)
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d   # start all services
#
# Architecture:
#   4 always-on: ais-fetcher, ais-ingest, postgres, api-server
#   2 scheduled: batch-pipeline (every 2h), cold-archiver (daily)
#
# IMPORTANT: Raw AIS data uses a host bind mount (/data/raw) so it survives
# docker compose down -v, container rebuilds, and volume pruning.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    build: ./db
    environment:
      POSTGRES_USER: heimdal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heimdal_dev}
      POSTGRES_DB: heimdal
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdal -d heimdal"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=30
      -c max_wal_size=512MB
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 3G

  # ---------------------------------------------------------------------------
  # Always-on Services
  # ---------------------------------------------------------------------------

  ais-ingest:
    build: ./services/ais-ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AISSTREAM_API_KEY: ${AIS_API_KEY}
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
      - /data/raw:/data/raw
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M

  adsb-ingest:
    build: ./services/adsb-ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./data/adsb:/app/data:ro
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M

  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN}
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,urllib.error;\ntry: urllib.request.urlopen(\"http://localhost:8000/api/health\")\nexcept urllib.error.HTTPError: pass'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 768M

  # ---------------------------------------------------------------------------
  # Scheduled Services (run via host cron or docker compose run)
  # ---------------------------------------------------------------------------

  batch-pipeline:
    build: ./services/batch-pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
      GFW_API_TOKEN: ${GFW_API_TOKEN}
      OPENSANCTIONS_DATA_PATH: /data/opensanctions
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./services/scoring:/app/scoring_src:ro
      - ./services/enrichment:/app/enrichment_src:ro
      - ./services/ais-ingest:/app/ingest_src:ro
      - ./data/opensanctions:/data/opensanctions:ro
      - /data/raw:/data/raw
    profiles:
      - batch
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 2G

  iacs-tracker:
    build: ./services/iacs-tracker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
    volumes:
      - ./shared:/app/shared:ro
    profiles:
      - batch
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  cold-archiver:
    build: ./services/cold-archiver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
      - /data/raw:/data/raw
    profiles:
      - batch
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 2G

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  pgdata:
