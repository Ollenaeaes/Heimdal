# =============================================================================
# Heimdal Platform — Docker Compose (Local Development)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# No ais-fetcher — use scripts/sync-data.sh to pull raw data from prod.
# Relaxed resource limits for development machines.
# =============================================================================

services:

  postgres:
    build: ./db
    environment:
      POSTGRES_USER: heimdal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heimdal_dev}
      POSTGRES_DB: heimdal
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdal -d heimdal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: ./db
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: heimdal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heimdal_dev}
      POSTGRES_DB: heimdal
      PGPASSWORD: ${DB_PASSWORD:-heimdal_dev}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Running migrations ==="
        for migration in $$(ls /docker-entrypoint-initdb.d/migrations/*.sql | sort); do
          filename=$$(basename "$$migration")
          echo "--- Applying: $$filename ---"
          psql -h postgres -U heimdal -d heimdal -f "$$migration"
        done
        echo "=== All migrations applied ==="

  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN}
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
      # REDIS_URL not set — api-server runs without Redis (batch mode).
      # The redis Python package isn't in the Docker image.
      # Set REDIS_URL=redis://redis:6379/0 after adding redis to requirements.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,urllib.error;\ntry: urllib.request.urlopen(\"http://localhost:8000/api/health\")\nexcept urllib.error.HTTPError: pass'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro

  batch-pipeline:
    build: ./services/batch-pipeline
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql+asyncpg://heimdal:${DB_PASSWORD:-heimdal_dev}@postgres:5432/heimdal"
      GFW_API_TOKEN: ${GFW_API_TOKEN}
      OPENSANCTIONS_DATA_PATH: /data/opensanctions
    volumes:
      - ./shared:/app/shared:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./services/scoring:/app/scoring_src:ro
      - ./services/enrichment:/app/enrichment_src:ro
      - ./services/ais-ingest:/app/ingest_src:ro
      - ./data/opensanctions:/data/opensanctions:ro
      - ./data/raw:/data/raw
    profiles:
      - batch

volumes:
  pgdata_dev:
  redis_dev:
