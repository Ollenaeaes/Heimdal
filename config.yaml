# -- Raw AIS Storage ----------------------------------------------------------
# Raw AIS messages are written to disk as gzipped JSONL files.  These are the
# durable source of truth — independent of the database.
raw_storage:
  base_path: /data/raw
  rotation_interval: 3600    # new file every hour
  compress: true             # gzip JSONL

# -- Batch Pipeline -----------------------------------------------------------
# The batch-pipeline service replaces real-time scoring and enrichment.
# It runs on a cron schedule, reading raw JSONL files and processing them.
batch_pipeline:
  schedule_interval: 7200    # run every 2 hours
  load_batch_size: 10000     # positions per INSERT batch
  score_batch_size: 100      # vessels per scoring batch

# -- Cold Storage -------------------------------------------------------------
# Compresses old JSONL to Parquet for long-term archival.
cold_storage:
  age_days: 30               # compress to Parquet after 30 days
  format: parquet
  compression: snappy
  retain_jsonl_days: 7       # keep JSONL for 7 days after Parquet creation

# -- Data Retention -----------------------------------------------------------
retention:
  # Number of days to keep raw AIS positions before archiving/deleting.
  positions_days: 90

  # Enable TimescaleDB compression on older position chunks.
  compression: true

# -- Frontend Defaults --------------------------------------------------------
frontend:
  # Initial camera position when the globe loads [longitude, latitude, altitude_m].
  initial_camera:
    longitude: 0.0
    latitude: 20.0
    altitude: 20000000   # ~20,000 km — full globe view

  # Number of hours of track trail to display behind a vessel.
  track_trail_hours: 24

  # Pixel radius for clustering nearby vessel markers on the globe.
  cluster_pixel_range: 45
